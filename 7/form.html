<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма заказа</title>
    
    <link rel="stylesheet" href="css/bootstrap.css">
</head>
<body>

    <style>
        body {
            background-color: #fff6d2 !important;
            color: #5c3a30 !important;
        }
    </style>

    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="index.html">Тортики по зодиаку</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid"> <!--Цетрирование через контейнер-->>
        <div class="row">
            <div class="col-xs-12 col-md-6 col-md-offset-3">
                <h1>Заказать торт</h1>
                
                <form>
                    <!-- Текстовое поле -->
                    <div class="form-group">
                        <label for="name">Имя</label>
                        <input type="text" class="form-control" id="name" placeholder="Введите имя">
                    </div>
                    
                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="example@mail.ru">
                    </div>
                    
                    <!-- Телефон -->
                    <div class="form-group">
                        <label for="phone">Телефон</label>
                        <input type="tel" class="form-control" id="phone" placeholder="+7 (999) 123-45-67">
                    </div>
                    
                    <!-- Радиокнопки -->
                    <div class="form-group">
                        <label>Выберите торт</label><br>
                        <label class="radio-inline">
                            <input type="radio" name="cake" value="scorpion"> Скорпион
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="cake" value="virgo"> Дева
                        </label>
                        <label class="radio-inline">
                            <input type="radio" name="cake" value="aquarius"> Водолей
                        </label>
                    </div>
                    
                    <!-- Дата -->
                    <div class="form-group">
                        <label for="date">Дата получения</label>
                        <input type="date" class="form-control" id="date">
                    </div>
                    
                    <!-- Текстовая область -->
                    <div class="form-group">
                        <label for="comment">Комментарий</label>
                        <textarea class="form-control" id="comment" rows="3" placeholder="Дополнительные пожелания"></textarea>
                    </div>
                    
                    <!-- Чекбокс -->
                    <div class="checkbox">
                        <label>
                            <input type="checkbox"> Согласен с условиями
                        </label>
                    </div>
                    
                    <!-- Кнопки -->
                    <button type="submit" class="btn btn-primary">Отправить</button>
                    <a href="index.html" class="btn btn-default">Назад</a>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
